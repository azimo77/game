<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tic Tac Toe</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --bg:#0a0a0f;
  --card:#1a1a26;
  --surface:#13131a;
  --border:#2a2a3e;
  --text:#e2e8f0;
  --muted:#666;
  --x:#ff4d6d;
  --o:#4cc9f0;
  --win:#ffd60a;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Space Mono', monospace;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
  overflow-y:auto;
}

.container{
  width:100%;
  max-width:420px;
  text-align:center;
}

.title{
  font-family:'Bebas Neue', sans-serif;
  font-size:55px;
  letter-spacing:5px;
  margin-bottom:5px;
  background:linear-gradient(90deg,var(--x),var(--o));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.subtitle{
  color:var(--muted);
  letter-spacing:3px;
  font-size:12px;
  margin-bottom:25px;
}

/* setup */

.setup{
  background:var(--card);
  border:1px solid var(--border);
  padding:25px;
  border-radius:15px;
}

.input-group{
  margin-bottom:15px;
  text-align:left;
}

.input-group label{
  display:block;
  margin-bottom:8px;
  font-size:12px;
  letter-spacing:2px;
}

.input-group input{
  width:100%;
  padding:12px;
  border:none;
  outline:none;
  border-radius:8px;
  background:var(--surface);
  color:white;
  border:1px solid var(--border);
}

.start-btn{
  width:100%;
  padding:13px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-family:'Bebas Neue', sans-serif;
  font-size:20px;
  letter-spacing:3px;
  background:linear-gradient(90deg,var(--x),#f72585);
  color:white;
}

/* game */

.game{
  display:none;
}

.scoreboard{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  gap:10px;
  margin-bottom:20px;
}

.player{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:12px;
}

.player h2{
  font-size:30px;
}

.x{
  color:var(--x);
}

.o{
  color:var(--o);
}

.player-name{
  font-size:11px;
  color:var(--muted);
  letter-spacing:2px;
}

.player-score{
  font-size:28px;
  font-family:'Bebas Neue', sans-serif;
}

.vs{
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:'Bebas Neue', sans-serif;
  font-size:20px;
  color:var(--muted);
}

.turn{
  margin-bottom:15px;
  color:var(--muted);
  letter-spacing:2px;
  font-size:12px;
}

/* board */

.board{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  max-width:300px;
  margin:auto;
}

.cell{
  aspect-ratio:1;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:45px;
  font-family:'Bebas Neue', sans-serif;
  cursor:pointer;
  transition:0.2s;
}

.cell:hover{
  transform:scale(1.03);
}

.x-cell{
  color:var(--x);
}

.o-cell{
  color:var(--o);
}

.win{
  border-color:var(--win);
  box-shadow:0 0 15px var(--win);
}

.status{
  margin-top:20px;
  min-height:30px;
  font-size:22px;
  font-family:'Bebas Neue', sans-serif;
  letter-spacing:2px;
}

.buttons{
  display:flex;
  gap:10px;
  margin-top:20px;
}

.buttons button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-family:'Bebas Neue', sans-serif;
  letter-spacing:2px;
}

.reset{
  background:linear-gradient(90deg,var(--x),#f72585);
  color:white;
}

.change{
  background:var(--card);
  color:white;
  border:1px solid var(--border);
}
</style>
</head>

<body>

<div class="container">

  <h1 class="title">TIC TAC TOE</h1>
  <div class="subtitle">TWO PLAYER GAME</div>

  <!-- setup -->
  <div class="setup" id="setup">

    <div class="input-group">
      <label style="color:#ff4d6d;">PLAYER X</label>
      <input type="text" id="player1" placeholder="Enter name">
    </div>

    <div class="input-group">
      <label style="color:#4cc9f0;">PLAYER O</label>
      <input type="text" id="player2" placeholder="Enter name">
    </div>

    <button class="start-btn" onclick="startGame()">START GAME</button>

  </div>

  <!-- game -->
  <div class="game" id="game">

    <div class="scoreboard">

      <div class="player">
        <h2 class="x">X</h2>
        <div class="player-name" id="nameX">Player 1</div>
        <div class="player-score x" id="scoreX">0</div>
      </div>

      <div class="vs">VS</div>

      <div class="player">
        <h2 class="o">O</h2>
        <div class="player-name" id="nameO">Player 2</div>
        <div class="player-score o" id="scoreO">0</div>
      </div>

    </div>

    <div class="turn" id="turnText">X TURN</div>

    <div class="board" id="board">
      <div class="cell" onclick="play(0)"></div>
      <div class="cell" onclick="play(1)"></div>
      <div class="cell" onclick="play(2)"></div>
      <div class="cell" onclick="play(3)"></div>
      <div class="cell" onclick="play(4)"></div>
      <div class="cell" onclick="play(5)"></div>
      <div class="cell" onclick="play(6)"></div>
      <div class="cell" onclick="play(7)"></div>
      <div class="cell" onclick="play(8)"></div>
    </div>

    <div class="status" id="status"></div>

    <div class="buttons">
      <button class="reset" onclick="resetBoard()">NEW ROUND</button>
      <button class="change" onclick="changePlayers()">CHANGE</button>
    </div>

  </div>

</div>

<script>

let board = ["","","","","","","","",""];
let currentPlayer = "X";
let active = false;

let scores = {
  X:0,
  O:0
};

let playerX = "Player 1";
let playerO = "Player 2";

const winPatterns = [
  [0,1,2],
  [3,4,5],
  [6,7,8],
  [0,3,6],
  [1,4,7],
  [2,5,8],
  [0,4,8],
  [2,4,6]
];

function startGame(){

  playerX = document.getElementById("player1").value || "Player 1";
  playerO = document.getElementById("player2").value || "Player 2";

  document.getElementById("nameX").textContent = playerX;
  document.getElementById("nameO").textContent = playerO;

  document.getElementById("setup").style.display = "none";
  document.getElementById("game").style.display = "block";

  resetBoard();
}

function play(index){

  if(board[index] !== "" || !active){
    return;
  }

  board[index] = currentPlayer;

  const cell = document.querySelectorAll(".cell")[index];

  cell.textContent = currentPlayer;

  if(currentPlayer === "X"){
    cell.classList.add("x-cell");
  }else{
    cell.classList.add("o-cell");
  }

  checkWinner();

  currentPlayer = currentPlayer === "X" ? "O" : "X";

  updateTurn();
}

function updateTurn(){

  if(active){
    document.getElementById("turnText").textContent =
      `${currentPlayer} TURN`;
  }
}

function checkWinner(){

  for(let pattern of winPatterns){

    let [a,b,c] = pattern;

    if(
      board[a] &&
      board[a] === board[b] &&
      board[a] === board[c]
    ){

      active = false;

      pattern.forEach(index=>{
        document.querySelectorAll(".cell")[index]
        .classList.add("win");
      });

      let winnerName =
        board[a] === "X" ? playerX : playerO;

      document.getElementById("status").textContent =
        `${winnerName} WINS!`;

      scores[board[a]]++;

      updateScores();

      return;
    }
  }

  if(!board.includes("")){

    active = false;

    document.getElementById("status").textContent =
      "DRAW!";
  }
}

function updateScores(){

  document.getElementById("scoreX").textContent =
    scores.X;

  document.getElementById("scoreO").textContent =
    scores.O;
}

function resetBoard(){

  board = ["","","","","","","","",""];

  currentPlayer = "X";

  active = true;

  document.querySelectorAll(".cell").forEach(cell=>{
    cell.textContent = "";
    cell.className = "cell";
  });

  document.getElementById("status").textContent = "";

  updateTurn();
}

function changePlayers(){

  document.getElementById("game").style.display = "none";

  document.getElementById("setup").style.display = "block";
}

</script>

</body>
</html>
